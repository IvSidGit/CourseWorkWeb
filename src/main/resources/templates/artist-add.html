<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/head"/>
<body>
<div th:replace="fragments/navbar"></div>
<main class="container">
  <article style="max-width: 700px; margin: 0 auto;">
    <hgroup>
      <h1>Добавление артиста</h1>
      <p>Заполните информацию об артисте ниже</p>
    </hgroup>
    <form th:action="@{/artists/add}"
          th:method="post"
          th:object="${artistModel}">


      <label for="name">
        Псевдоним артиста:
        <input th:field="*{name}"
               th:errorclass="is-invalid"
               type="text"
               id="name"
               placeholder="Введите псевдоним артиста"
               required/>
        <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></small>
      </label>

      <label for="careerStartYear">
        Год начала карьеры:
        <input th:field="*{careerStartYear}"
               th:errorclass="is-invalid"
               type="number"
               step="1"
               min="1800"
               id="careerStartYear"
               placeholder="Введите год начала карьеры"
               required/>
        <small th:if="${#fields.hasErrors('careerStartYear')}" th:errors="*{careerStartYear}" class="text-danger"></small>
      </label>

      <label for="description">
        Описание
        <textarea th:field="*{description}"
                  th:errorclass="is-invalid"
                  id="description"
                  rows="4"
                  placeholder="Введите информацию об артисте..."
                  required></textarea>
        <small th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></small>
      </label>


      <button type="submit">Добавить артиста</button>
    </form>
  </article>
</main>
<footer th:replace="fragments/footer"></footer>
</body>
</html>
