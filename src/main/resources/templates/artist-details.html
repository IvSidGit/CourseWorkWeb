<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/head"/>
<body>
<div th:replace="fragments/navbar"></div>
<main class="container">
    <hgroup>
        <h1>Информация об артисте</h1>
        <p>Подробные сведения об артисте</p>
    </hgroup>
    <article class="card">
        <div class="grid">
            <div>
                <h2 th:text="${artistDetails.name}"></h2>
                <p><strong>Транскрипция:</strong> <span th:text="${artistDetails.slug}"></span></p>
                <p><strong>Год начала карьеры:</strong> <span th:text="${artistDetails.careerStartYear}"></span></p>
                <p><strong>Описание:</strong> <span th:text="${artistDetails.description}"></span></p>
                <div sec:authorize="hasAnyRole('ADMIN', 'MODERATOR')">
                                        <form th:action="@{/artists/artist-delete/{name}(name=${artistDetails.slug})}"
                                                    th:method="delete"
                                                    onsubmit="return confirm('Вы уверены, что хотите удалить этого артиста?')">
                                                <button type="submit" class="secondary">Удалить артиста</button>
                    </form>
                </div>
                <p><strong>Песни:</strong></p>
                <ul class="song-list">
                    <li th:each="song : ${artistDetails.songs}">
                        <a th:href="@{/songs/song-details/{slug}(slug=${song.slug})}" th:text="${song.title}"></a>
                    </li>
                </ul>
            </div>
            <div class="text-center">
                <img src="/pic/artist.png" alt="артист" style="width: 100%; max-width: 350px; border-radius: var(--pico-border-radius);">
            </div>
        </div>
    </article>
</main>
<footer th:replace="fragments/footer"></footer>
</body>
</html>
