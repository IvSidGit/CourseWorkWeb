<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head"/>
<body>
<div th:replace="fragments/navbar"></div>

<main class="container">
  <hgroup>
    <h1>Результаты поиска артистов</h1>
    <p th:if="${searchQuery}">По запросу: <strong>"[[${searchQuery}]]"</strong></p>
  </hgroup>

  <div th:if="${searchResults == null or searchResults.isEmpty()}">
    <article class="card" >
      <p>:(</p>
      <p>Ничего не найдено</p>
      <p>Попробуйте изменить поисковый запрос</p>
      <a th:href="@{/artists/all}" class="button">Вернуться к списку артистов</a>
    </article>
  </div>

  <div th:if="${searchResults != null and !searchResults.isEmpty()}">
    <p>Найдено артистов: <span th:text="${searchResults.size()}"></span></p>

    <div>
      <div th:each="artist : ${searchResults}" class="card">
        <h3 th:text="${artist.name}"></h3>
        <p><strong>Транскрипция:</strong> <span th:text="${artist.slug}"></span></p>
        <p><strong>Год начала карьеры:</strong> <span th:text="${artist.careerStartYear}"></span></p>

        <a th:href="@{/artists/artist-details/{slug}(slug=${artist.slug})}"
           role="button"
           class="outline">
          Подробнее
        </a>
      </div>
    </div>
    <a th:href="@{/artists/all}" class="button">Вернуться к списку артистов</a>
  </div>
</main>

<footer th:replace="fragments/footer"></footer>
</body>
</html>
