<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head"/>
<body>
<div th:replace="fragments/navbar"></div>

<main class="container">
  <hgroup>
    <h1>Результаты поиска артистов</h1>
    <p th:if="${searchQuery}">По запросу: <strong>"[[${searchQuery}]]"</strong></p>
  </hgroup>

  <!-- Если результатов нет -->
  <div th:if="${searchResults == null or searchResults.isEmpty()}">
    <article class="card" style="text-align: center; padding: 3rem;">
      <p style="font-size: 1.5rem; margin-bottom: 1rem;">😕</p>
      <p style="font-size: 1.2rem; color: #666;">Ничего не найдено</p>
      <p>Попробуйте изменить поисковый запрос</p>
      <a th:href="@{/artists/all}" class="button" style="margin-top: 1rem;">Вернуться к списку артистов</a>
    </article>
  </div>

  <!-- Если есть результаты -->
  <div th:if="${searchResults != null and !searchResults.isEmpty()}">
    <p>Найдено артистов: <span th:text="${searchResults.size()}"></span></p>

    <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
      <div th:each="artist : ${searchResults}" class="card">
        <h3 th:text="${artist.name}"></h3>
        <p><strong>Транскрипция:</strong> <span th:text="${artist.slug}"></span></p>
        <p><strong>Год начала карьеры:</strong> <span th:text="${artist.careerStartYear}"></span></p>
        <!-- УБРАЛИ поле description, так как его нет в DTO -->
        <a th:href="@{/artists/artist-details/{slug}(slug=${artist.slug})}"
           role="button"
           class="outline">
          Подробнее
        </a>
      </div>
    </div>
  </div>
</main>

<footer th:replace="fragments/footer"></footer>
</body>
</html>
