<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/head"/>
<body>
<div th:replace="fragments/navbar"></div>
<main class="container">
    <hgroup>
        <h1>Профиль пользователя</h1>
    </hgroup>
    <article class="card">
        <div class="grid">
            <div th:object="${userDetails}">
                <h2 th:text="*{username}"></h2>
                <p><strong>Email:</strong> <span th:text="*{email}"></span></p>
                <p th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'') or hasRole(''ROLE_MODERATOR'')')}">
                    <strong>Полное имя:</strong> <span th:text="*{fullName}"></span>
                </p>
                <p th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'') or hasRole(''ROLE_MODERATOR'')')}">
                    <strong>Возраст:</strong> <span th:text="*{age}"></span>
                </p>
                <p th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'') or hasRole(''ROLE_MODERATOR'')')}">
                    <strong>Роли на сайте:</strong>
                    <span th:each="role, stat : *{roles}">
                    <span th:text="${role.name}"></span>
                    <span th:unless="${stat.last}">, </span>
                </span>

                </p>
                <p><strong>Песни добавленные этим пользователем:</strong></p>
                <div th:if="${#lists.isEmpty(userDetails.createdSongs)}">
                    <p class="text-muted" style="font-style: italic; color: #6c757d;">
                        Он еще не добавлял песен
                    </p>
                </div>


                <ul th:unless="${#lists.isEmpty(userDetails.createdSongs)}" class="song-list">
                    <li th:each="song : *{createdSongs}">
                        <a th:href="@{/songs/song-details/{slug}(slug=${song.slug})}" th:text="${song.title}"></a>
                    </li>
                </ul>
            </div>
            <div class="text-center">
                <img src="/pic/user.png" alt="Профиль пользователя"
                     style="width: 100%; max-width: 300px; border-radius: var(--pico-border-radius);">
            </div>
        </div>
    </article>
</main>
<footer th:replace="fragments/footer"></footer>
</body>
</html>
